# Foundation 360 Database Configuration
# Edit these values according to your MySQL setup

# Database Connection Settings
db.host=localhost
db.port=3306
db.name=foundation_360

# Authentication
db.user=root
db.password=

# Connection Pool Settings
db.pool.minSize=5
db.pool.maxSize=20

# Connection Timeout (milliseconds)
db.connection.timeout=30000

# Additional JDBC Options
db.useSSL=false
db.serverTimezone=UTC
db.allowPublicKeyRetrieval=true
db.autoReconnect=true

# ============================================
# COMMON CONFIGURATIONS
# ============================================

# For XAMPP/WAMP (Default)
# db.user=root
# db.password=

# For MySQL Workbench Installation
# db.user=root
# db.password=your_password

# For Remote Database
# db.host=192.168.1.100
# db.user=remote_user
# db.password=remote_password

# ============================================
# TROUBLESHOOTING
# ============================================
# 
# Error: Access Denied
# - Check db.user and db.password
# 
# Error: Communications Link Failure
# - Verify MySQL is running
# - Check db.host and db.port
# 
# Error: Unknown Database
# - Create database: CREATE DATABASE foundation_360;
# - Or change db.name to existing database
#
# ============================================
